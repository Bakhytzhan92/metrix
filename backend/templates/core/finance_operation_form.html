{% extends "base.html" %}
{% block title %}{{ title }} — Metrix{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl">
  <h1 class="mb-6 text-2xl font-semibold text-slate-900">{{ title }}</h1>

  <form method="post" class="space-y-4 rounded-xl bg-white p-6 shadow-sm ring-1 ring-slate-100">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}
      <div class="text-sm">
        <label class="mb-1 block font-medium text-slate-700" for="{{ field.id_for_label %}">
          {{ field.label }}
        </label>
        {{ field }}
        {% for error in field.errors %}
          <p class="mt-1 text-xs text-red-600">{{ error }}</p>
        {% endfor %}
      </div>
    {% endfor %}
    <div class="flex gap-3 pt-2">
      <button type="submit" class="inline-flex items-center rounded-md px-4 py-2 text-sm font-medium text-white {% if operation_type == 'income' %}bg-green-600 hover:bg-green-700{% elif operation_type == 'expense' %}bg-red-600 hover:bg-red-700{% else %}bg-indigo-600 hover:bg-indigo-700{% endif %}">
        Сохранить
      </button>
      <a href="{% url 'finance_dashboard' %}" class="inline-flex items-center rounded-md bg-slate-100 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-200">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}

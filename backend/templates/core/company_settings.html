{% extends "base.html" %}

{% block title %}Настройки компании — Metrix{% endblock %}

{% block content %}
  <h1 class="text-2xl font-semibold text-slate-900 mb-4">Настройки компании</h1>

  <div class="mb-6">
    <a href="{% url 'settings_access' %}" class="inline-flex items-center rounded-md bg-slate-100 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-200">Права доступа</a>
  </div>

  <form method="post" class="space-y-4 max-w-lg bg-white p-6 rounded-xl shadow-sm ring-1 ring-slate-100">
    {% csrf_token %}
    {% for field in form %}
      <div class="text-sm">
        <label class="block text-slate-700 mb-1" for="{{ field.id_for_label }}">
          {{ field.label }}
        </label>
        {{ field }}
        {% for error in field.errors %}
          <p class="text-xs text-red-600 mt-1">{{ error }}</p>
        {% endfor %}
      </div>
    {% endfor %}

    <button
      type="submit"
      class="inline-flex items-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700"
    >
      Сохранить
    </button>
  </form>
{% endblock %}

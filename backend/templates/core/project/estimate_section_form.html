{% extends "core/project/project_layout.html" %}

{% block project_content %}
<div class="max-w-lg rounded-xl bg-white p-6 shadow-sm ring-1 ring-slate-100">
  <h2 class="text-lg font-semibold text-slate-900 mb-4">{% if is_edit %}Редактировать раздел{% else %}Добавить раздел{% endif %}</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="mt-4 flex gap-2">
      <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">Сохранить</button>
      <a href="{% url 'project_estimate' project.pk %}" class="rounded-md border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Создать склад — Metrix{% endblock %}

{% block content %}
<div class="max-w-lg rounded-xl bg-white p-6 shadow-sm ring-1 ring-slate-100">
  <h1 class="text-xl font-semibold text-slate-900 mb-4">Создать склад</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="mt-4 flex gap-2">
      <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">Создать</button>
      <a href="{% url 'warehouses_dashboard' %}" class="rounded-md border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}

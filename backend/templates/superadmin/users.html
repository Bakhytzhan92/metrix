{% extends "superadmin/base.html" %}
{% block title %}Пользователи{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Пользователи</h1>
<div class="flex flex-wrap gap-2 mb-4">
  <label class="text-sm text-slate-600">Компания (id): <input type="number" id="fcompany" class="border rounded px-2 py-1 w-24" placeholder="все" /></label>
  <button type="button" id="filter" class="px-3 py-1 rounded bg-slate-800 text-white text-sm">Фильтр</button>
</div>
<p id="msg" class="text-sm text-red-600 mb-4 min-h-[1.25rem]"></p>
<div class="overflow-x-auto bg-white rounded-lg border border-slate-200 shadow-sm">
  <table class="min-w-full text-sm">
    <thead class="bg-slate-50 text-left text-slate-600">
      <tr>
        <th class="px-3 py-2">Логин</th>
        <th class="px-3 py-2">Email</th>
        <th class="px-3 py-2">Компания</th>
        <th class="px-3 py-2">Роль</th>
        <th class="px-3 py-2">Действия</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
</div>
{% endblock %}
{% block scripts %}
<script>
  const msg = document.getElementById('msg');
  const rows = document.getElementById('rows');
  async function load() {
    const cid = document.getElementById('fcompany').value;
    let url = '/api/superadmin/users/';
    if (cid) url += '?company=' + encodeURIComponent(cid);
    const r = await fetch(url, { headers: { Accept: 'application/json' }, credentials: 'same-origin' });
    const d = await r.json();
    rows.innerHTML = '';
    if (!d.ok) { msg.textContent = d.error || 'Ошибка'; return; }
    msg.textContent = '';
    for (const u of d.users) {
      const tr = document.createElement('tr');
      tr.className = 'border-t border-slate-100';
      tr.innerHTML = `<td class="px-3 py-2">${u.username}</td><td class="px-3 py-2">${u.email}</td><td class="px-3 py-2">${u.company_name || '—'}</td><td class="px-3 py-2">${u.role || '—'}</td>
        <td class="px-3 py-2 space-x-1">
          <button type="button" data-rp="${u.id}" class="text-xs text-violet-700 underline">Сброс пароля</button>
          <button type="button" data-li="${u.id}" class="text-xs text-slate-700 underline">Войти как</button>
        </td>`;
      rows.appendChild(tr);
    }
    rows.querySelectorAll('[data-rp]').forEach((b) => b.addEventListener('click', async () => {
      const id = b.getAttribute('data-rp');
      const x = await apiPost('/api/superadmin/users/' + id + '/reset-password/');
      if (!x.ok) msg.textContent = x.error || 'Ошибка';
      else alert('Временный пароль: ' + x.temporary_password);
    }));
    rows.querySelectorAll('[data-li]').forEach((b) => b.addEventListener('click', async () => {
      const id = b.getAttribute('data-li');
      if (!confirm('Войти под этим пользователем?')) return;
      const x = await apiPost('/api/superadmin/login-as-user/' + id + '/');
      if (!x.ok) msg.textContent = x.error || 'Ошибка';
      else window.location.href = x.redirect || '/';
    }));
  }
  document.getElementById('filter').addEventListener('click', load);
  load();
</script>
{% endblock %}
